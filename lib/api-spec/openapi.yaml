openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Pilates Studio Management API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: classes
    description: Pilates class operations
  - name: clients
    description: Client operations
  - name: instructors
    description: Instructor operations
  - name: reservations
    description: Reservation operations
  - name: memberships
    description: Membership plan operations
  - name: clientMemberships
    description: Client membership operations
  - name: dashboard
    description: Dashboard summary operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /classes:
    get:
      operationId: listClasses
      tags: [classes]
      summary: List all classes
      responses:
        "200":
          description: List of classes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PilatesClass"
    post:
      operationId: createClass
      tags: [classes]
      summary: Create a new class
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClassBody"
      responses:
        "201":
          description: Created class
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PilatesClass"

  /classes/{id}:
    get:
      operationId: getClass
      tags: [classes]
      summary: Get a class by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Class details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PilatesClass"
    put:
      operationId: updateClass
      tags: [classes]
      summary: Update a class
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClassBody"
      responses:
        "200":
          description: Updated class
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PilatesClass"
    delete:
      operationId: deleteClass
      tags: [classes]
      summary: Delete a class
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /clients:
    get:
      operationId: listClients
      tags: [clients]
      summary: List all clients
      responses:
        "200":
          description: List of clients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Client"
    post:
      operationId: createClient
      tags: [clients]
      summary: Create a new client
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClientBody"
      responses:
        "201":
          description: Created client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"

  /clients/{id}:
    get:
      operationId: getClient
      tags: [clients]
      summary: Get a client by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Client details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
    put:
      operationId: updateClient
      tags: [clients]
      summary: Update a client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClientBody"
      responses:
        "200":
          description: Updated client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
    delete:
      operationId: deleteClient
      tags: [clients]
      summary: Delete a client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /clients/{id}/attendance:
    get:
      operationId: getClientAttendance
      tags: [clients]
      summary: Get attendance history for a client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Attendance records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AttendanceRecord"

  /instructors:
    get:
      operationId: listInstructors
      tags: [instructors]
      summary: List all instructors
      responses:
        "200":
          description: List of instructors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Instructor"
    post:
      operationId: createInstructor
      tags: [instructors]
      summary: Create a new instructor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInstructorBody"
      responses:
        "201":
          description: Created instructor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Instructor"

  /reservations:
    get:
      operationId: listReservations
      tags: [reservations]
      summary: List all reservations
      responses:
        "200":
          description: List of reservations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Reservation"
    post:
      operationId: createReservation
      tags: [reservations]
      summary: Create a new reservation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReservationBody"
      responses:
        "201":
          description: Created reservation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reservation"

  /reservations/{id}:
    delete:
      operationId: cancelReservation
      tags: [reservations]
      summary: Cancel a reservation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Cancelled

  /reservations/{id}/attendance:
    patch:
      operationId: markAttendance
      tags: [reservations]
      summary: Mark or unmark attendance for a reservation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarkAttendanceBody"
      responses:
        "200":
          description: Updated reservation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reservation"

  /memberships:
    get:
      operationId: listMemberships
      tags: [memberships]
      summary: List all membership plans
      responses:
        "200":
          description: List of membership plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MembershipPlan"
    post:
      operationId: createMembership
      tags: [memberships]
      summary: Create a membership plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMembershipBody"
      responses:
        "201":
          description: Created membership plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MembershipPlan"

  /memberships/{id}:
    delete:
      operationId: deleteMembership
      tags: [memberships]
      summary: Delete a membership plan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /client-memberships:
    get:
      operationId: listClientMemberships
      tags: [clientMemberships]
      summary: List all client memberships
      responses:
        "200":
          description: List of client memberships
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ClientMembership"
    post:
      operationId: createClientMembership
      tags: [clientMemberships]
      summary: Assign a membership to a client
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClientMembershipBody"
      responses:
        "201":
          description: Created client membership
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientMembership"

  /client-memberships/{id}:
    delete:
      operationId: deleteClientMembership
      tags: [clientMemberships]
      summary: Cancel a client membership
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Cancelled

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/today-classes:
    get:
      operationId: getTodayClasses
      tags: [dashboard]
      summary: Get today's classes
      responses:
        "200":
          description: Today's classes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PilatesClass"

  /dashboard/recent-clients:
    get:
      operationId: getRecentClients
      tags: [dashboard]
      summary: Get recently registered clients
      responses:
        "200":
          description: Recent clients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Client"

  /dashboard/occupancy:
    get:
      operationId: getDashboardOccupancy
      tags: [dashboard]
      summary: Get class occupancy chart data
      responses:
        "200":
          description: Occupancy data per class
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OccupancyItem"

  /dashboard/top-clients:
    get:
      operationId: getDashboardTopClients
      tags: [dashboard]
      summary: Get top clients by reservations
      responses:
        "200":
          description: Top clients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TopClientItem"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    PilatesClass:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        instructor:
          type: string
        instructorId:
          type: integer
        time:
          type: string
        duration:
          type: integer
          description: Duration in minutes
        capacity:
          type: integer
        enrolled:
          type: integer
        level:
          type: string
          enum: [Principiante, Intermedio, Avanzado]
        type:
          type: string
          enum: [Reformer, Mat, Privada]
        status:
          type: string
          enum: [Activa, Cancelada, Completa]
        dayOfWeek:
          type: string
        date:
          type: string
      required:
        - id
        - name
        - instructor
        - instructorId
        - time
        - duration
        - capacity
        - enrolled
        - level
        - type
        - status
        - dayOfWeek
        - date

    CreateClassBody:
      type: object
      properties:
        name:
          type: string
        instructorId:
          type: integer
        time:
          type: string
        duration:
          type: integer
        capacity:
          type: integer
        level:
          type: string
          enum: [Principiante, Intermedio, Avanzado]
        type:
          type: string
          enum: [Reformer, Mat, Privada]
        dayOfWeek:
          type: string
        date:
          type: string
      required:
        - name
        - instructorId
        - time
        - duration
        - capacity
        - level
        - type
        - dayOfWeek
        - date

    Client:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: string
        email:
          type: string
        plan:
          type: string
          enum: [Mensual, Trimestral, Anual, Por Clase]
        classesRemaining:
          type: integer
        notes:
          type: string
        createdAt:
          type: string
      required:
        - id
        - name
        - phone
        - email
        - plan
        - classesRemaining
        - createdAt

    CreateClientBody:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        email:
          type: string
        plan:
          type: string
          enum: [Mensual, Trimestral, Anual, Por Clase]
        classesRemaining:
          type: integer
        notes:
          type: string
      required:
        - name
        - phone
        - email
        - plan
        - classesRemaining

    AttendanceRecord:
      type: object
      properties:
        id:
          type: integer
        classId:
          type: integer
        className:
          type: string
        date:
          type: string
        attended:
          type: boolean
      required:
        - id
        - classId
        - className
        - date
        - attended

    Instructor:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        specialties:
          type: array
          items:
            type: string
      required:
        - id
        - name
        - email
        - phone
        - specialties

    CreateInstructorBody:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        specialties:
          type: array
          items:
            type: string
      required:
        - name
        - email
        - phone
        - specialties

    Reservation:
      type: object
      properties:
        id:
          type: integer
        clientId:
          type: integer
        clientName:
          type: string
        classId:
          type: integer
        className:
          type: string
        date:
          type: string
        status:
          type: string
          enum: [Confirmada, Pendiente, Cancelada]
        attended:
          type: boolean
      required:
        - id
        - clientId
        - clientName
        - classId
        - className
        - date
        - status
        - attended

    CreateReservationBody:
      type: object
      properties:
        clientId:
          type: integer
        classId:
          type: integer
        date:
          type: string
      required:
        - clientId
        - classId
        - date

    MarkAttendanceBody:
      type: object
      properties:
        attended:
          type: boolean
      required:
        - attended

    MembershipPlan:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        totalClasses:
          type: integer
        price:
          type: integer
        durationDays:
          type: integer
        active:
          type: boolean
      required:
        - id
        - name
        - totalClasses
        - price
        - durationDays
        - active

    CreateMembershipBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        totalClasses:
          type: integer
        price:
          type: integer
        durationDays:
          type: integer
        active:
          type: boolean
      required:
        - name
        - totalClasses
        - price
        - durationDays

    ClientMembership:
      type: object
      properties:
        id:
          type: integer
        clientId:
          type: integer
        membershipId:
          type: integer
        membershipName:
          type: string
        clientName:
          type: string
        startDate:
          type: string
        endDate:
          type: string
        classesUsed:
          type: integer
        classesTotal:
          type: integer
        status:
          type: string
          enum: [Activa, Vencida, Agotada, Cancelada]
      required:
        - id
        - clientId
        - membershipId
        - membershipName
        - clientName
        - startDate
        - endDate
        - classesUsed
        - classesTotal
        - status

    CreateClientMembershipBody:
      type: object
      properties:
        clientId:
          type: integer
        membershipId:
          type: integer
        membershipName:
          type: string
        clientName:
          type: string
        startDate:
          type: string
        endDate:
          type: string
        classesTotal:
          type: integer
        status:
          type: string
      required:
        - clientId
        - membershipId
        - membershipName
        - clientName
        - startDate
        - endDate
        - classesTotal

    DashboardSummary:
      type: object
      properties:
        todayClassesCount:
          type: integer
        activeClientsCount:
          type: integer
        pendingReservationsCount:
          type: integer
        availableSpotsCount:
          type: integer
      required:
        - todayClassesCount
        - activeClientsCount
        - pendingReservationsCount
        - availableSpotsCount

    OccupancyItem:
      type: object
      properties:
        className:
          type: string
        enrolled:
          type: integer
        capacity:
          type: integer
        fillPct:
          type: integer
      required:
        - className
        - enrolled
        - capacity
        - fillPct

    TopClientItem:
      type: object
      properties:
        clientName:
          type: string
        reservationsCount:
          type: integer
      required:
        - clientName
        - reservationsCount
