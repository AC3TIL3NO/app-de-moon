openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Pilates Studio Management API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: studio
    description: Studio settings operations
  - name: reports
    description: Analytics and reporting operations
  - name: classes
    description: Pilates class operations
  - name: clients
    description: Client operations
  - name: instructors
    description: Instructor operations
  - name: reservations
    description: Reservation operations
  - name: memberships
    description: Membership plan operations
  - name: clientMemberships
    description: Client membership operations
  - name: dashboard
    description: Dashboard summary operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"

  /studio/settings:
    get:
      operationId: getStudioSettings
      tags: [studio]
      summary: Get studio settings
      responses:
        "200":
          description: Studio settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudioSettings"
    patch:
      operationId: updateStudioSettings
      tags: [studio]
      summary: Update studio settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStudioSettingsBody"
      responses:
        "200":
          description: Updated studio settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudioSettings"

  /reports/revenue:
    get:
      operationId: getRevenueReport
      tags: [reports]
      summary: Get monthly revenue report
      responses:
        "200":
          description: Revenue by month
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RevenueItem"

  /reports/new-clients:
    get:
      operationId: getNewClientsReport
      tags: [reports]
      summary: Get new clients per month
      responses:
        "200":
          description: New clients by month
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NewClientsItem"

  /reports/cancellations:
    get:
      operationId: getCancellationsReport
      tags: [reports]
      summary: Get cancellations per month
      responses:
        "200":
          description: Cancellations by month
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CancellationsItem"

  /reports/occupancy:
    get:
      operationId: getOccupancyReport
      tags: [reports]
      summary: Get occupancy by time slot
      responses:
        "200":
          description: Occupancy by hour
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OccupancyReportItem"

  /reports/memberships:
    get:
      operationId: getMembershipsReport
      tags: [reports]
      summary: Get memberships sold per month
      responses:
        "200":
          description: Memberships by month
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MembershipsReportItem"

  /classes:
    get:
      operationId: listClasses
      tags: [classes]
      summary: List all classes
      responses:
        "200":
          description: List of classes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PilatesClass"
    post:
      operationId: createClass
      tags: [classes]
      summary: Create a new class
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClassBody"
      responses:
        "201":
          description: Created class
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PilatesClass"

  /classes/{id}:
    get:
      operationId: getClass
      tags: [classes]
      summary: Get a class by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Class details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PilatesClass"
    put:
      operationId: updateClass
      tags: [classes]
      summary: Update a class
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClassBody"
      responses:
        "200":
          description: Updated class
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PilatesClass"
    delete:
      operationId: deleteClass
      tags: [classes]
      summary: Delete a class
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /clients:
    get:
      operationId: listClients
      tags: [clients]
      summary: List all clients
      responses:
        "200":
          description: List of clients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Client"
    post:
      operationId: createClient
      tags: [clients]
      summary: Create a new client
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClientBody"
      responses:
        "201":
          description: Created client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"

  /clients/{id}:
    get:
      operationId: getClient
      tags: [clients]
      summary: Get a client by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Client details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
    put:
      operationId: updateClient
      tags: [clients]
      summary: Update a client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClientBody"
      responses:
        "200":
          description: Updated client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
    delete:
      operationId: deleteClient
      tags: [clients]
      summary: Delete a client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /clients/{id}/attendance:
    get:
      operationId: getClientAttendance
      tags: [clients]
      summary: Get attendance history for a client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Attendance records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AttendanceRecord"

  /instructors:
    get:
      operationId: listInstructors
      tags: [instructors]
      summary: List all instructors
      responses:
        "200":
          description: List of instructors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Instructor"
    post:
      operationId: createInstructor
      tags: [instructors]
      summary: Create a new instructor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInstructorBody"
      responses:
        "201":
          description: Created instructor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Instructor"

  /reservations:
    get:
      operationId: listReservations
      tags: [reservations]
      summary: List all reservations
      responses:
        "200":
          description: List of reservations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Reservation"
    post:
      operationId: createReservation
      tags: [reservations]
      summary: Create a new reservation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReservationBody"
      responses:
        "201":
          description: Created reservation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reservation"

  /reservations/{id}:
    delete:
      operationId: cancelReservation
      tags: [reservations]
      summary: Cancel a reservation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Cancelled

  /reservations/{id}/attendance:
    patch:
      operationId: markAttendance
      tags: [reservations]
      summary: Mark or unmark attendance for a reservation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarkAttendanceBody"
      responses:
        "200":
          description: Updated reservation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reservation"

  /memberships:
    get:
      operationId: listMemberships
      tags: [memberships]
      summary: List all membership plans
      responses:
        "200":
          description: List of membership plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MembershipPlan"
    post:
      operationId: createMembership
      tags: [memberships]
      summary: Create a membership plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMembershipBody"
      responses:
        "201":
          description: Created membership plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MembershipPlan"

  /memberships/{id}:
    delete:
      operationId: deleteMembership
      tags: [memberships]
      summary: Delete a membership plan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /client-memberships:
    get:
      operationId: listClientMemberships
      tags: [clientMemberships]
      summary: List all client memberships
      responses:
        "200":
          description: List of client memberships
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ClientMembership"
    post:
      operationId: createClientMembership
      tags: [clientMemberships]
      summary: Assign a membership to a client
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClientMembershipBody"
      responses:
        "201":
          description: Created client membership
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientMembership"

  /client-memberships/{id}:
    delete:
      operationId: deleteClientMembership
      tags: [clientMemberships]
      summary: Cancel a client membership
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Cancelled

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/today-classes:
    get:
      operationId: getTodayClasses
      tags: [dashboard]
      summary: Get today's classes
      responses:
        "200":
          description: Today's classes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PilatesClass"

  /dashboard/recent-clients:
    get:
      operationId: getRecentClients
      tags: [dashboard]
      summary: Get recently registered clients
      responses:
        "200":
          description: Recent clients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Client"

  /dashboard/occupancy:
    get:
      operationId: getDashboardOccupancy
      tags: [dashboard]
      summary: Get class occupancy chart data
      responses:
        "200":
          description: Occupancy data per class
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OccupancyItem"

  /dashboard/top-clients:
    get:
      operationId: getDashboardTopClients
      tags: [dashboard]
      summary: Get top clients by classes attended
      responses:
        "200":
          description: Top clients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TopClientItem"

  /dashboard/weekly-attendance:
    get:
      operationId: getDashboardWeeklyAttendance
      tags: [dashboard]
      summary: Get attendance count grouped by day of week
      responses:
        "200":
          description: Weekly attendance data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WeeklyAttendanceItem"

  /dashboard/popular-classes:
    get:
      operationId: getDashboardPopularClasses
      tags: [dashboard]
      summary: Get reservations grouped by class type
      responses:
        "200":
          description: Popular classes data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PopularClassItem"

  /notifications/send-test/{id}:
    post:
      operationId: sendTestNotification
      tags: [notifications]
      summary: Send a WhatsApp test reminder for a reservation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationResult"

  /payments/create-checkout-session:
    post:
      operationId: createCheckoutSession
      tags: [payments]
      summary: Create a Stripe Checkout session for a membership
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCheckoutSessionBody"
      responses:
        "200":
          description: Checkout session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutSessionResult"

  /payments/webhook:
    post:
      operationId: handleStripeWebhook
      tags: [payments]
      summary: Handle Stripe webhook events
      responses:
        "200":
          description: Webhook handled
          content:
            application/json:
              schema:
                type: object
                properties:
                  received:
                    type: boolean
                required:
                  - received

  /payments:
    get:
      operationId: listPayments
      tags: [payments]
      summary: List all payments
      responses:
        "200":
          description: List of payments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Payment"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    LoginBody:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required:
        - email
        - password

    AuthUser:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [ADMIN, RECEPTIONIST, INSTRUCTOR]
        studioId:
          type: integer
        studioName:
          type: string
      required:
        - id
        - email
        - name
        - role
        - studioId
        - studioName

    LoginResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/AuthUser"
      required:
        - token
        - user

    StudioSettings:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        logoUrl:
          type: string
          nullable: true
        primaryColor:
          type: string
        secondaryColor:
          type: string
        phone:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        cancellationPolicy:
          type: string
          nullable: true
        createdAt:
          type: string
      required:
        - id
        - name
        - slug
        - primaryColor
        - secondaryColor
        - createdAt

    UpdateStudioSettingsBody:
      type: object
      properties:
        name:
          type: string
        logoUrl:
          type: string
        primaryColor:
          type: string
        secondaryColor:
          type: string
        phone:
          type: string
        email:
          type: string
        address:
          type: string
        cancellationPolicy:
          type: string

    RevenueItem:
      type: object
      properties:
        month:
          type: string
        total:
          type: number
        count:
          type: integer
      required:
        - month
        - total
        - count

    NewClientsItem:
      type: object
      properties:
        month:
          type: string
        count:
          type: integer
      required:
        - month
        - count

    CancellationsItem:
      type: object
      properties:
        month:
          type: string
        cancelled:
          type: integer
        total:
          type: integer
      required:
        - month
        - cancelled
        - total

    OccupancyReportItem:
      type: object
      properties:
        hour:
          type: string
        reservations:
          type: integer
        capacity:
          type: integer
        occupancyPct:
          type: integer
      required:
        - hour
        - reservations
        - capacity
        - occupancyPct

    MembershipsReportItem:
      type: object
      properties:
        month:
          type: string
        count:
          type: integer
        revenue:
          type: number
      required:
        - month
        - count
        - revenue

    PilatesClass:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        instructor:
          type: string
        instructorId:
          type: integer
        time:
          type: string
        duration:
          type: integer
          description: Duration in minutes
        capacity:
          type: integer
        enrolled:
          type: integer
        level:
          type: string
          enum: [Principiante, Intermedio, Avanzado]
        type:
          type: string
          enum: [Reformer, Mat, Privada]
        status:
          type: string
          enum: [Activa, Cancelada, Completa]
        dayOfWeek:
          type: string
        date:
          type: string
      required:
        - id
        - name
        - instructor
        - instructorId
        - time
        - duration
        - capacity
        - enrolled
        - level
        - type
        - status
        - dayOfWeek
        - date

    CreateClassBody:
      type: object
      properties:
        name:
          type: string
        instructorId:
          type: integer
        time:
          type: string
        duration:
          type: integer
        capacity:
          type: integer
        level:
          type: string
          enum: [Principiante, Intermedio, Avanzado]
        type:
          type: string
          enum: [Reformer, Mat, Privada]
        dayOfWeek:
          type: string
        date:
          type: string
      required:
        - name
        - instructorId
        - time
        - duration
        - capacity
        - level
        - type
        - dayOfWeek
        - date

    Client:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: string
        email:
          type: string
        plan:
          type: string
          enum: [Mensual, Trimestral, Anual, Por Clase]
        classesRemaining:
          type: integer
        notes:
          type: string
        createdAt:
          type: string
      required:
        - id
        - name
        - phone
        - email
        - plan
        - classesRemaining
        - createdAt

    CreateClientBody:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        email:
          type: string
        plan:
          type: string
          enum: [Mensual, Trimestral, Anual, Por Clase]
        classesRemaining:
          type: integer
        notes:
          type: string
      required:
        - name
        - phone
        - email
        - plan
        - classesRemaining

    AttendanceRecord:
      type: object
      properties:
        id:
          type: integer
        classId:
          type: integer
        className:
          type: string
        date:
          type: string
        attended:
          type: boolean
      required:
        - id
        - classId
        - className
        - date
        - attended

    Instructor:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        specialties:
          type: array
          items:
            type: string
      required:
        - id
        - name
        - email
        - phone
        - specialties

    CreateInstructorBody:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        specialties:
          type: array
          items:
            type: string
      required:
        - name
        - email
        - phone
        - specialties

    Reservation:
      type: object
      properties:
        id:
          type: integer
        clientId:
          type: integer
        clientName:
          type: string
        classId:
          type: integer
        className:
          type: string
        date:
          type: string
        status:
          type: string
          enum: [Confirmada, Pendiente, Cancelada]
        attended:
          type: boolean
      required:
        - id
        - clientId
        - clientName
        - classId
        - className
        - date
        - status
        - attended

    CreateReservationBody:
      type: object
      properties:
        clientId:
          type: integer
        classId:
          type: integer
        date:
          type: string
      required:
        - clientId
        - classId
        - date

    MarkAttendanceBody:
      type: object
      properties:
        attended:
          type: boolean
      required:
        - attended

    MembershipPlan:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        totalClasses:
          type: integer
        price:
          type: number
        durationDays:
          type: integer
        active:
          type: boolean
      required:
        - id
        - name
        - totalClasses
        - price
        - durationDays
        - active

    CreateMembershipBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        totalClasses:
          type: integer
        price:
          type: number
        durationDays:
          type: integer
        active:
          type: boolean
      required:
        - name
        - totalClasses
        - price
        - durationDays
        - active

    ClientMembership:
      type: object
      properties:
        id:
          type: integer
        clientId:
          type: integer
        clientName:
          type: string
        membershipId:
          type: integer
        membershipName:
          type: string
        classesUsed:
          type: integer
