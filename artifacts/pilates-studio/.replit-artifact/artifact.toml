kind = "web"
previewPath = "/"
title = "Pilates Studio Manager"
version = "1.0.0"
id = "artifacts/pilates-studio"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23216

[services.development]
run = "pnpm --filter @workspace/pilates-studio run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pilates-studio", "run", "build" ]
publicDir = "artifacts/pilates-studio/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23216"
BASE_PATH = "/"
